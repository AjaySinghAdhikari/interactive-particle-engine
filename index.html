<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Magnificent Hand-Tracked Particles</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        canvas { display: block; }
        #video-container {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 160px;
            height: 120px;
            z-index: 10;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            overflow: hidden;
            transform: scaleX(-1); /* Mirror the webcam preview */
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        #ui {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 8px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 { margin: 0 0 10px 0; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px; }
        p { margin: 5px 0; font-size: 0.9rem; color: #ccc; }
        .highlight { color: #00ffff; font-weight: bold; text-shadow: 0 0 10px rgba(0,255,255,0.5); }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="video-container">
        <video class="input_video"></video>
    </div>

    <div id="ui">
        <h1>Particle Engine</h1>
        <p>Current Form: <span id="shape-name" class="highlight">Galaxy</span></p>
        <p>🖐 <b>Move Hand:</b> Warps space & changes color</p>
        <p>👏 <b>Clap Hands:</b> Mutate Shape</p>
    </div>

<script>
    // --- CONFIGURATION ---
    const PARTICLE_COUNT = 15000; // High density for better visuals
    const PARTICLE_SIZE = 0.12;
    const SHAPE_SWITCH_COOLDOWN = 2000; // ms

    // --- THREE.JS SETUP ---
    const scene = new THREE.Scene();
    // Add some subtle fog for depth
    scene.fog = new THREE.FogExp2(0x000000, 0.02);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 35;

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // --- PARTICLE SYSTEM STATE ---
    const particles = {
        geometry: new THREE.BufferGeometry(),
        material: new THREE.PointsMaterial({
            size: PARTICLE_SIZE,
            vertexColors: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            transparent: true,
            opacity: 0.9
        }),
        positions: new Float32Array(PARTICLE_COUNT * 3),
        targetPositions: new Float32Array(PARTICLE_COUNT * 3),
        colors: new Float32Array(PARTICLE_COUNT * 3),
        mesh: null
    };

    // Initialize random positions
    for (let i = 0; i < PARTICLE_COUNT * 3; i++) {
        particles.positions[i] = (Math.random() - 0.5) * 100;
        particles.colors[i] = 1; // Start white
    }

    particles.geometry.setAttribute('position', new THREE.BufferAttribute(particles.positions, 3));
    particles.geometry.setAttribute('color', new THREE.BufferAttribute(particles.colors, 3));
    particles.mesh = new THREE.Points(particles.geometry, particles.material);
    scene.add(particles.mesh);

    // --- MATH & SHAPES ---
    const shapes = ['Galaxy', 'TorusKnot', 'KleinBottle', 'BlackHole', 'Sphere', 'Heart'];
    let currentShapeIndex = 0;
    let lastSwitchTime = 0;

    // 1. GALAXY SPIRAL (Logarithmic Spiral with arms)
    function getPointOnGalaxy(i) {
        const arms = 5;
        const spin = i / PARTICLE_COUNT * arms * Math.PI * 2;
        const radius = (i / PARTICLE_COUNT) * 15; 
        const scatter = Math.random() * 0.5;
        return {
            x: (radius + scatter) * Math.cos(spin + scatter),
            y: (Math.random() - 0.5) * (radius * 0.2), 
            z: (radius + scatter) * Math.sin(spin + scatter)
        };
    }

    // 2. TORUS KNOT (Intricate interlocking tube)
    function getPointOnTorusKnot(i) {
        const t = (i / PARTICLE_COUNT) * Math.PI * 2 * 3; // 3 loops
        const p = 2; 
        const q = 3;
        const scale = 3.5;
        
        const r = Math.cos(q * t) + 2;
        const x = r * Math.cos(p * t);
        const y = r * Math.sin(p * t);
        const z = -Math.sin(q * t);

        const tubeRadius = 0.5;
        const theta = Math.random() * Math.PI * 2;
        
        return {
            x: (x + tubeRadius * Math.cos(theta)) * scale,
            y: (y + tubeRadius * Math.sin(theta)) * scale,
            z: (z + tubeRadius * Math.sin(theta)) * scale
        };
    }

    // 3. KLEIN BOTTLE (Complex surface)
    function getPointOnKleinBottle(i) {
        const u = (i / PARTICLE_COUNT) * Math.PI * 4;
        const v = Math.random() * Math.PI * 2;
        const r = 4 - 2 * Math.cos(u);
        
        let x, y, z;
        if (u < Math.PI) {
            x = (6 * Math.cos(u) * (1 + Math.sin(u)) + 4 * r * Math.cos(u) * Math.cos(v));
            y = (16 * Math.sin(u) + 4 * r * Math.sin(u) * Math.cos(v));
            z = (4 * r * Math.sin(v));
        } else {
            x = (6 * Math.cos(u) * (1 + Math.sin(u)) - 4 * r * Math.cos(v));
            y = (16 * Math.sin(u));
            z = (4 * r * Math.sin(v));
        }
        return { x: x * 0.2, y: y * 0.2, z: z * 0.2 };
    }

    // 4. BLACK HOLE (Funnel + Disk)
    function getPointOnBlackHole(i) {
        const ratio = 0.8; 
        if (i < PARTICLE_COUNT * ratio) {
            const angle = Math.random() * Math.PI * 2;
            const r = 5 + Math.random() * 10; 
            return {
                x: r * Math.cos(angle),
                y: (Math.random() - 0.5) * 0.5,
                z: r * Math.sin(angle)
            };
        } else {
            const t = (i / (PARTICLE_COUNT * (1 - ratio)));
            const angle = t * Math.PI * 10;
            const r = 5 * (1 - t); 
            const depth = -10 * t; 
            return {
                x: r * Math.cos(angle),
                y: depth,
                z: r * Math.sin(angle)
            };
        }
    }

    // 5. SPHERE
    function getPointOnSphere(i) {
        const phi = Math.acos(-1 + (2 * i) / PARTICLE_COUNT);
        const theta = Math.sqrt(PARTICLE_COUNT * Math.PI) * phi;
        const r = 12;
        return {
            x: r * Math.cos(theta) * Math.sin(phi),
            y: r * Math.sin(theta) * Math.sin(phi),
            z: r * Math.cos(phi)
        };
    }
    
    // 6. HEART
    function getPointOnHeart(i) {
        const scale = 0.5;
        const range = Math.PI * 2;
        const u = Math.random() * range; 
        
        const x = 16 * Math.pow(Math.sin(u), 3);
        const y = 13 * Math.cos(u) - 5 * Math.cos(2*u) - 2 * Math.cos(3*u) - Math.cos(4*u);
        const z = (Math.random() - 0.5) * 4; 
        return { x: x * scale, y: y * scale, z: z };
    }

    function generateTargetPositions(shapeType) {
        const positions = particles.targetPositions;
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            let pt;
            switch (shapeType) {
                case 'Galaxy': pt = getPointOnGalaxy(i); break;
                case 'TorusKnot': pt = getPointOnTorusKnot(i); break;
                case 'KleinBottle': pt = getPointOnKleinBottle(i); break;
                case 'BlackHole': pt = getPointOnBlackHole(i); break;
                case 'Sphere': pt = getPointOnSphere(i); break;
                case 'Heart': pt = getPointOnHeart(i); break;
                default: pt = getPointOnSphere(i);
            }
            positions[i * 3] = pt.x;
            positions[i * 3 + 1] = pt.y;
            positions[i * 3 + 2] = pt.z;
        }
        document.getElementById('shape-name').innerText = shapeType;
    }

    // Initial shape
    generateTargetPositions(shapes[0]);

    // --- ANIMATION LOOP ---
    let handPos = { x: 0, y: 0, active: false };
    let secondHandPos = { x: 0, y: 0, active: false };

    function animate() {
        requestAnimationFrame(animate);

        const positions = particles.geometry.attributes.position.array;
        const targets = particles.targetPositions;
        const colors = particles.geometry.attributes.color.array;

        // Interactive Color based on hand X position
        const r = handPos.active ? (handPos.x + 15) / 30 : 0.2;
        const g = handPos.active ? (handPos.y + 15) / 30 : 0.5;
        const b = 0.9;

        for (let i = 0; i < PARTICLE_COUNT; i++) {
            const ix = i * 3;
            const iy = i * 3 + 1;
            const iz = i * 3 + 2;

            // 1. Morphing: Linear Interpolation towards target
            positions[ix] += (targets[ix] - positions[ix]) * 0.05;
            positions[iy] += (targets[iy] - positions[iy]) * 0.05;
            positions[iz] += (targets[iz] - positions[iz]) * 0.05;

            // 2. Hand Interaction
            if (handPos.active) {
                const dx = positions[ix] - handPos.x;
                const dy = positions[iy] - handPos.y;
                const dz = positions[iz] - 0; 
                
                const distSq = dx*dx + dy*dy + dz*dz;
                const dist = Math.sqrt(distSq);

                // Vortex Effect around hand
                if (dist < 12) {
                    const force = (12 - dist) * 0.05;
                    // Add some curl/noise
                    positions[ix] -= dy * 0.01 * force;
                    positions[iy] += dx * 0.01 * force;
                    positions[iz] += force * 0.5; // push z slightly
                }
            }

            // 3. Update Colors
            // Mix base color with position-based variety
            colors[ix] += (r - colors[ix]) * 0.03;
            colors[iy] += (g - colors[iy]) * 0.03;
            colors[iz] += (b - colors[iz]) * 0.03;
        }

        particles.geometry.attributes.position.needsUpdate = true;
        particles.geometry.attributes.color.needsUpdate = true;
        
        // Gentle rotation of the whole system
        particles.mesh.rotation.y += 0.003;
        particles.mesh.rotation.z += 0.001;

        renderer.render(scene, camera);
    }

    animate();

    // --- MEDIAPIPE HANDS SETUP ---
    const videoElement = document.getElementsByClassName('input_video')[0];
    
    function onResults(results) {
        handPos.active = false;
        secondHandPos.active = false;

        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
            
            // Hand 1
            const hand1 = results.multiHandLandmarks[0];
            const x1 = (0.5 - hand1[8].x) * 40; 
            const y1 = (0.5 - hand1[8].y) * 30; 
            
            handPos.x = x1;
            handPos.y = y1;
            handPos.active = true;

            // Hand 2 (for Clap detection)
            if (results.multiHandLandmarks.length > 1) {
                const hand2 = results.multiHandLandmarks[1];
                const x2 = (0.5 - hand2[8].x) * 40;
                const y2 = (0.5 - hand2[8].y) * 30;
                
                secondHandPos.x = x2;
                secondHandPos.y = y2;
                secondHandPos.active = true;

                // CHECK CLAP
                const dist = Math.sqrt(Math.pow(x2 - x1, 2) + Math.pow(y2 - y1, 2));
                
                const now = Date.now();
                if (dist < 5 && now - lastSwitchTime > SHAPE_SWITCH_COOLDOWN) {
                    lastSwitchTime = now;
                    currentShapeIndex = (currentShapeIndex + 1) % shapes.length;
                    generateTargetPositions(shapes[currentShapeIndex]);
                }
            }
        }
    }

    const hands = new Hands({locateFile: (file) => {
        return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
    }});

    hands.setOptions({
        maxNumHands: 2,
        modelComplexity: 1,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
    });

    hands.onResults(onResults);

    const cameraUtils = new Camera(videoElement, {
        onFrame: async () => {
            await hands.send({image: videoElement});
        },
        width: 320,
        height: 240
    });
    cameraUtils.start();

    // Resize Handler
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

</script>
</body>
</html>
